<!DOCTYPE html>
<!-- ORBIT - personal CRM - single-file PWA (Forever Apps stack) -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Inner Orbit" />
  <meta name="theme-color" content="#0e1116" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Inner Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
          integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
          integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"
          integrity="sha384-sw98ksifz4z7bpf5bssQYm0RlqkUsNXcYh7KqhO3+SIrvf3+mf0kQRNxaCWcgzjG"
          crossorigin="anonymous"></script>

  <style>
    /* ---- Orbit palette (cosmic indigo). Branding = drop-in swap. ---- */
    :root{
      --bg:#0e1116; --bg-2:#141925; --surface:#1a2030; --surface-2:#222a3d;
      --line:#2c3650; --line-soft:#283044;
      --text:#eef2fb; --text-dim:#a9b4cc; --text-faint:#6f7c99;
      --accent:#6c8cff; --accent-dim:#4f6bd6;
      --ok:#56c596; --amber:#e7b24c; --danger:#e5645a;
      --shadow:0 8px 28px rgba(0,0,0,0.5);
      --radius:16px;
    }
    :root[data-theme="light"]{
      --bg:#f4f6fb; --bg-2:#eef1f8; --surface:#ffffff; --surface-2:#f3f5fb;
      --line:#dde2ee; --line-soft:#e7ebf4;
      --text:#161b26; --text-dim:#4d586f; --text-faint:#8893a8;
      --accent:#4f6bd6; --accent-dim:#3f57b8;
      --shadow:0 8px 24px rgba(20,30,60,0.12);
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; padding:0; height:100%; }
    body{
      background:var(--bg); color:var(--text);
      font-family:"Outfit",system-ui,-apple-system,sans-serif;
      font-size:16px; line-height:1.45;
      overscroll-behavior-y:none;
    }
    #root{ height:100%; }
    h1,h2,h3{ font-family:"Space Grotesk","Outfit",sans-serif; margin:0; }
    button{ font-family:inherit; cursor:pointer; }
    a{ color:var(--accent); }

    .app-shell{ display:flex; flex-direction:column; min-height:100%;
      max-width:560px; margin:0 auto; }
    .topbar{ position:sticky; top:0; z-index:20; padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
      background:linear-gradient(180deg,var(--bg) 70%, rgba(14,17,22,0)); }
    .topbar h1{ font-size:24px; letter-spacing:-0.4px; }
    .topbar .sub{ color:var(--text-dim); font-size:13px; margin-top:2px; }
    .content{ flex:1; padding:6px 16px 96px; }

    .nav{ position:fixed; left:0; right:0; bottom:0; z-index:30;
      display:flex; justify-content:space-around; align-items:center;
      max-width:560px; margin:0 auto;
      background:var(--surface); border-top:1px solid var(--line);
      padding:8px 8px calc(env(safe-area-inset-bottom) + 8px); }
    .nav button{ background:none; border:0; color:var(--text-faint);
      display:flex; flex-direction:column; align-items:center; gap:3px;
      font-size:11px; font-weight:500; padding:6px 10px; border-radius:12px; }
    .nav button.on{ color:var(--accent); }
    .nav .add{ width:48px; height:48px; border-radius:50%; background:var(--accent);
      color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:26px; line-height:1; margin-top:-20px; box-shadow:var(--shadow); }

    .card{ background:var(--surface); border:1px solid var(--line);
      border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
    .btn{ background:var(--surface-2); color:var(--text); border:1px solid var(--line);
      border-radius:12px; padding:11px 16px; font-size:15px; font-weight:600; width:100%; }
    .btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.ghost{ background:none; border:none; color:var(--accent); width:auto; padding:8px; }
    .btn.danger{ color:var(--danger); }
    .row{ display:flex; gap:10px; align-items:center; }
    .field{ margin-bottom:12px; }
    .field label{ display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; }
    .input{ width:100%; background:var(--bg-2); border:1px solid var(--line); color:var(--text);
      border-radius:12px; padding:12px 14px; font-size:16px; }
    .input:focus{ outline:none; border-color:var(--accent); }
    /* password field with the reveal eyeball (PORTABLE-IMPROVEMENTS 2026-07-10) */
    .pw-wrap{ position:relative; }
    .pw-wrap .input{ padding-right:46px; }
    .pw-eye{ position:absolute; right:6px; top:50%; transform:translateY(-50%); width:36px; height:36px;
      display:flex; align-items:center; justify-content:center; border-radius:50%;
      background:none; border:none; padding:0; cursor:pointer; color:var(--text-dim); }
    .pw-eye:active{ color:var(--text); }
    .pw-eye svg{ width:19px; height:19px; }

    .empty{ text-align:center; color:var(--text-dim); padding:56px 20px; }
    .empty .glyph{ font-size:40px; opacity:.5; margin-bottom:10px; }
    .muted{ color:var(--text-faint); font-size:13px; }
    .pill{ display:inline-block; background:var(--surface-2); border:1px solid var(--line);
      color:var(--text-dim); border-radius:999px; padding:3px 10px; font-size:12px; margin:2px 4px 2px 0; }

    .syncbar{ position:fixed; top:env(safe-area-inset-top); left:0; right:0; z-index:40;
      display:flex; align-items:center; gap:10px; justify-content:center;
      background:var(--accent); color:#fff; font-size:13px; font-weight:600; padding:8px 14px;
      max-width:560px; margin:0 auto; }
    .syncbar button{ background:rgba(255,255,255,.2); border:0; color:#fff;
      border-radius:8px; padding:5px 12px; font-weight:600; }
    .toast{ position:fixed; bottom:96px; left:50%; transform:translateX(-50%); z-index:50;
      background:var(--surface-2); color:var(--text); border:1px solid var(--line);
      border-radius:12px; padding:10px 18px; font-size:14px; box-shadow:var(--shadow);
      max-width:90%; }

    /* auth */
    .auth-wrap{ min-height:100%; display:flex; flex-direction:column; justify-content:center;
      max-width:420px; margin:0 auto; padding:32px 22px; }
    .brand{ text-align:center; margin-bottom:26px; }
    .brand .mark{ font-family:"Space Grotesk",sans-serif; font-size:40px; font-weight:700;
      letter-spacing:-1px; background:linear-gradient(120deg,var(--accent),#a78bff);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .brand .tag{ color:var(--text-dim); font-size:14px; margin-top:4px; }
    .notice{ background:var(--surface-2); border:1px solid var(--line); border-radius:12px;
      padding:12px 14px; font-size:13px; color:var(--text-dim); margin-bottom:14px; }
    .err{ color:var(--danger); font-size:13px; margin:8px 2px; }

    /* ---- lists / contacts (Phase 2) ---- */
    .seg{ display:flex; gap:6px; background:var(--surface-2); border:1px solid var(--line);
      border-radius:12px; padding:4px; margin-bottom:10px; }
    .seg button{ flex:1; background:none; border:0; color:var(--text-dim); padding:8px;
      border-radius:9px; font-weight:600; font-size:14px; }
    .seg button.on{ background:var(--accent); color:#fff; }
    .search{ margin-bottom:10px; }
    .chips{ display:flex; flex-wrap:wrap; gap:0; margin:2px 0 8px; }
    .filterchips{ overflow-x:auto; flex-wrap:nowrap; padding-bottom:2px; }
    .filterchips .pill{ cursor:pointer; white-space:nowrap; }
    .pill.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
    .pill.removable{ cursor:pointer; }
    .list-row{ display:flex; align-items:center; gap:12px; padding:12px 6px;
      border-bottom:1px solid var(--line-soft); cursor:pointer; }
    .list-row:active{ background:var(--surface-2); }
    .lr-main{ flex:1; min-width:0; }
    .lr-name{ font-weight:600; }
    .lr-main .muted{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .avatar{ width:40px; height:40px; border-radius:50%; background:var(--surface-2);
      border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:14px; color:var(--accent); flex-shrink:0; }
    .avatar.sq{ border-radius:10px; }
    .avatar.lg{ width:56px; height:56px; font-size:18px; }

    /* ---- overlays / forms / detail ---- */
    .overlay{ position:fixed; inset:0; z-index:60; background:var(--bg);
      display:flex; flex-direction:column; max-width:560px; margin:0 auto; }
    .overlay-head{ display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:calc(env(safe-area-inset-top) + 12px) 14px 10px; border-bottom:1px solid var(--line); }
    .overlay-head b{ font-size:16px; }
    .overlay-body{ flex:1; overflow-y:auto; padding:16px 16px 48px; }
    .icon-btn{ background:none; border:0; color:var(--text); font-size:22px;
      width:34px; height:34px; border-radius:8px; }
    textarea.input{ resize:vertical; font-family:inherit; }
    select.input{ appearance:none; -webkit-appearance:none; }
    .drow{ padding:9px 0; border-bottom:1px solid var(--line-soft); }
    .dlabel{ font-size:12px; color:var(--text-faint); margin-bottom:2px; }
    .drow a{ word-break:break-all; }
    .detail-name{ display:flex; align-items:center; gap:14px; margin-bottom:12px; }
    .detail-name h2{ font-size:22px; }

    /* ---- bottom sheet ---- */
    .sheet-backdrop{ position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.5);
      display:flex; align-items:flex-end; }
    .sheet{ background:var(--surface); border-top-left-radius:18px; border-top-right-radius:18px;
      padding:18px 16px calc(env(safe-area-inset-bottom) + 18px); width:100%; max-width:560px; margin:0 auto; }

    /* ---- interactions / follow-ups / home (Phase 3) ---- */
    .sec-title{ font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.05em;
      color:var(--text-faint); margin-bottom:8px; }
    .timeline-item{ display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--line-soft); }
    .timeline-item:last-child{ border-bottom:0; }
    .ti-dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); margin-top:7px; flex-shrink:0; }
    .ti-main{ flex:1; min-width:0; }
    .task-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line-soft); }
    .task-row:last-child{ border-bottom:0; }
    .task-row input[type=checkbox]{ width:20px; height:20px; accent-color:var(--accent); flex-shrink:0; }
    .due-over{ color:var(--danger); }
    .due-today{ color:var(--amber); }
    .list-row .btn{ font-size:13px; padding:7px 12px; }
    .duecard{ border-radius:12px; padding:10px 14px; font-size:14px; font-weight:600; margin-bottom:12px;
      border:1px solid var(--line); }
    .duecard.alert{ background:rgba(229,100,90,.12); border-color:var(--danger); color:var(--danger); }
    .duecard.ok{ background:var(--surface-2); color:var(--text-dim); }

    /* ---- AI panel (Phase 4) ---- */
    .ai-out{ white-space:pre-wrap; line-height:1.5; }
    .ai-loading{ display:flex; align-items:center; gap:10px; color:var(--text-dim); padding:8px 0; }
    .spinner{ width:16px; height:16px; border-radius:50%; border:2px solid var(--line);
      border-top-color:var(--accent); display:inline-block; animation:spin .8s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
  </style>

  <script>
    /* Apply saved theme before first paint (no flash). Dark is the default. */
    (function(){
      try {
        var t = localStorage.getItem('orbit_theme');
        if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch(e){}
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
/* ============================================================
   ORBIT - application code (shell)
   ============================================================ */
const { useState, useEffect, useRef, useCallback } = React;

/* ---- branding / config ---------------------------------------------- */
const APP_VERSION = "0.2.2";
const BRAND = { name: "Inner Orbit", tagline: "Stay close to the people in your orbit." };

// Hosted backend base (Railway). Overridable per-user in Settings.
const API_BASE_DEFAULT = "https://inner-orbit-production.up.railway.app";

// Supabase Auth. The publishable (anon) key is public by design — safe to ship.
const SUPABASE_URL = "https://efzuuqhraaxwsrkqfavn.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_IjI9GIq0HirrfCUbcRm3AQ_2izsa8b7";

const CFG_KEY  = "orbit_config";
const DATA_KEY = "orbit_data";

// CRM collections (must match the backend COLLECTIONS).
const ARRAY_COLLECTIONS  = ["contacts","organizations","interactions","tasks","deals"];
const OBJECT_COLLECTIONS = ["meta"];
const ALL_COLLECTIONS    = ARRAY_COLLECTIONS.concat(OBJECT_COLLECTIONS);

/* ---- tiny utils ------------------------------------------------------ */
const LOG = [];
function logMsg(tag,msg){ const line="["+tag+"] "+msg; LOG.push(line); if(LOG.length>300)LOG.shift();
  if (tag==="ERROR"||tag==="WARN") console.warn(line); }
function uid(p){ return (p||"id")+"_"+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function apiBase(cfg){ return (((cfg&&cfg.apiBase)||API_BASE_DEFAULT)).replace(/\/+$/,""); }

/* ---- date / follow-up helpers --------------------------------------- */
function addDays(iso, n){ const d=new Date(iso+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
function daysBetween(aISO, bISO){ const a=new Date(aISO+"T00:00:00Z"), b=new Date(bISO+"T00:00:00Z"); return Math.round((b-a)/86400000); }
function maxDate(a, b){ if(!a) return b; if(!b) return a; return a>b ? a : b; }
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso+"T00:00:00Z"); if(isNaN(d)) return iso;
  return d.toLocaleDateString(undefined,{ month:"short", day:"numeric", year:"numeric", timeZone:"UTC" }); }
// Cadence status for a contact: null if no cadence set, else over/today/ok.
function contactDueInfo(c){
  if(!c || !c.cadence_days) return null;
  const base = c.last_interaction_at || c.created_at || todayISO();
  const due = addDays(base, c.cadence_days);
  const over = daysBetween(due, todayISO());          // today - due
  if(over > 0)  return { state:"over",  days:over,  label:"Reach out — "+over+" day"+(over===1?"":"s")+" overdue" };
  if(over === 0) return { state:"today", days:0,    label:"Reach out — due today" };
  return { state:"ok", days:-over, label:"Next reach-out in "+(-over)+" day"+(over===-1?"":"s") };
}
// Days until the next occurrence of a MM-DD birthday (ignores year). null if unset/invalid.
function daysUntilBirthday(bday){
  if(!bday || bday.length<5) return null;
  const p=bday.split("-"); const mo=+p[1]-1, da=+p[2];
  if(isNaN(mo)||isNaN(da)) return null;
  const now=new Date(); const t=new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  let next=new Date(Date.UTC(t.getUTCFullYear(), mo, da));
  if(next < t) next=new Date(Date.UTC(t.getUTCFullYear()+1, mo, da));
  return Math.round((next - t)/86400000);
}

/* Interaction types */
const ITYPES = [["note","Note"],["call","Call"],["text","Text"],["email","Email"],["meet","In person"]];
function ITypeLabel(t){ const f=ITYPES.find(x=>x[0]===t); return f ? f[1] : "Note"; }

/* Deal pipeline stages (optional deals layer) */
const STAGES = [["lead","Lead"],["contacted","Contacted"],["proposal","Proposal"],["won","Won"],["lost","Lost"]];
function stageLabel(s){ const f=STAGES.find(x=>x[0]===s); return f ? f[1] : "Lead"; }
function fmtMoney(n){ const v=Number(n); if(!v) return ""; return "$"+v.toLocaleString(undefined,{ maximumFractionDigits:0 }); }

/* ---- config + cache (localStorage) ----------------------------------- */
function loadConfig(){
  try { return JSON.parse(localStorage.getItem(CFG_KEY)||"{}") || {}; } catch(e){ return {}; }
}
function saveConfig(cfg){
  try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch(e){}
}
function loadCache(){
  try { return JSON.parse(localStorage.getItem(DATA_KEY)||"null"); } catch(e){ return null; }
}
function saveCache(payload){
  try { localStorage.setItem(DATA_KEY, JSON.stringify(payload)); } catch(e){}
}
function configComplete(cfg){ return !!(cfg && cfg.accessToken && cfg.userId); }
function emptyData(){
  const d = {}; ARRAY_COLLECTIONS.forEach(c=> d[c]=[]); OBJECT_COLLECTIONS.forEach(c=> d[c]={}); return d;
}

/* ---- Supabase auth: bearer token + silent refresh -------------------- */
/* Lifted from the MenuCaptain shell (the proven Forever Apps auth plumbing). */
let _refreshPromise = null;

function signOutHard(){
  try { localStorage.removeItem(CFG_KEY); localStorage.removeItem(DATA_KEY); } catch(e){}
  try {
    if (navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({ type:"clearCache" });
    }
  } catch(e){}
  location.reload();
}

async function doRefresh(cfg){
  if (!cfg.refreshToken){ signOutHard(); throw new Error("no refresh token"); }
  let res;
  try {
    res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
      body:JSON.stringify({ refresh_token: cfg.refreshToken }),
    });
  } catch(err){ logMsg("ERROR","token refresh network error: "+err.message); throw err; }
  if (!res.ok){ logMsg("ERROR","token refresh rejected "+res.status); signOutHard(); throw new Error("refresh rejected"); }
  const data = await res.json();
  cfg.accessToken  = data.access_token;
  cfg.refreshToken = data.refresh_token || cfg.refreshToken;
  cfg.expiresAt    = data.expires_at || (Math.floor(Date.now()/1000) + (data.expires_in||3600));
  saveConfig(cfg);
  return cfg.accessToken;
}

async function getFreshToken(cfg){
  const nowMs = Date.now();
  const expMs = cfg.expiresAt ? cfg.expiresAt*1000 : 0;
  if (cfg.accessToken && (expMs - nowMs) > 60000) return cfg.accessToken;
  if (!_refreshPromise) _refreshPromise = doRefresh(cfg).finally(()=>{ _refreshPromise=null; });
  return await _refreshPromise;
}

async function authHeaders(cfg){
  const token = await getFreshToken(cfg);
  return { "Authorization":"Bearer "+token, "X-User-ID":cfg.userId };
}

/* sign-in / sign-up via Supabase Auth REST */
async function supabasePassword(grant, email, password){
  if (!SUPABASE_URL) throw new Error("Supabase isn't configured yet.");
  const path = grant==="signup" ? "/auth/v1/signup" : "/auth/v1/token?grant_type=password";
  const res = await fetch(SUPABASE_URL + path, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":SUPABASE_PUBLISHABLE_KEY },
    body:JSON.stringify({ email, password }),
  });
  const data = await res.json().catch(()=> ({}));
  if (!res.ok) throw new Error(data.error_description || data.msg || data.error || ("Auth failed ("+res.status+")"));
  return data;
}

/* ---- native push (Capacitor only; gated OFF until Firebase) ---------- */
const PUSH_ENABLED = false;
let _pushInited = false;
async function initPush(cfg){
  try {
    if (!PUSH_ENABLED) return;
    const Cap = window.Capacitor;
    if (!Cap || typeof Cap.isNativePlatform !== "function" || !Cap.isNativePlatform()) return;
    const PN = Cap.Plugins && Cap.Plugins.PushNotifications;
    if (!PN || _pushInited) return;
    _pushInited = true;
    const platform = (typeof Cap.getPlatform==="function" ? Cap.getPlatform() : "unknown");
    PN.addListener("registration", async (tok)=>{
      try {
        if (!tok || !tok.value) return;
        await fetch(apiBase(cfg)+"/api/push/register", {
          method:"POST",
          headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
          body:JSON.stringify({ token:tok.value, platform }),
        });
      } catch(e){ logMsg("WARN","push register failed: "+(e&&e.message)); }
    });
    const perm = await PN.requestPermissions();
    if (perm && perm.receive==="granted") await PN.register();
    else _pushInited = false;
  } catch(e){ logMsg("WARN","initPush failed: "+(e&&e.message)); _pushInited=false; }
}

/* ---- collections API client ----------------------------------------- */
async function getCollection(cfg, name){
  const res = await fetch(apiBase(cfg)+"/api/collection/"+name, { headers: await authHeaders(cfg) });
  if (!res.ok) throw new Error("GET "+name+" -> "+res.status);
  return res.json();
}
async function putCollection(cfg, name, data){
  const res = await fetch(apiBase(cfg)+"/api/collection/"+name, {
    method:"PUT",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body:JSON.stringify(data),
  });
  if (!res.ok) throw new Error("PUT "+name+" -> "+res.status);
  return res.json();
}

/* ---- AI relay client ------------------------------------------------- */
async function aiRelay(cfg, { task, messages, system, max_tokens }){
  const res = await fetch(apiBase(cfg)+"/api/ai/relay", {
    method:"POST",
    headers:{ "Content-Type":"application/json", ...(await authHeaders(cfg)) },
    body:JSON.stringify({ task, model:"claude-haiku-4-5-20251001", max_tokens:max_tokens||1024, messages, system }),
  });
  const data = await res.json().catch(()=> ({}));
  if (!res.ok) { const e=new Error(data.detail||("AI failed "+res.status)); e.status=res.status; throw e; }
  return (data.content||[]).map(b=> b.text||"").join("").trim();
}

/* ---- version check / in-app updater --------------------------------- */
async function fetchDeployedVersion(){
  try {
    const url = location.pathname + "?vcheck=" + Date.now();
    const res = await fetch(url, { cache:"no-store" });
    const html = await res.text();
    const m = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    return m ? m[1] : null;
  } catch(e){ return null; }
}
function isNewer(a,b){
  const pa=(a||"0").split(".").map(Number), pb=(b||"0").split(".").map(Number);
  for (let i=0;i<3;i++){ if((pa[i]||0)>(pb[i]||0))return true; if((pa[i]||0)<(pb[i]||0))return false; }
  return false;
}
function applyUpdate(version){
  const base = location.origin + location.pathname;
  location.replace(base + "?v=" + encodeURIComponent(version||Date.now()));
}

function AuthScreen({ onSignedIn, onExplore }){
  const [mode,setMode] = useState("signin");
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState("");
  const [info,setInfo] = useState("");

  async function submit(){
    setErr(""); setInfo(""); setBusy(true);
    try {
      const data = await supabasePassword(mode, email.trim(), pw);
      if (!data.access_token){
        // signup with email confirmation on: no session yet
        setInfo("Check your email to confirm your account, then sign in.");
        setMode("signin"); return;
      }
      const cfg = loadConfig();
      cfg.accessToken  = data.access_token;
      cfg.refreshToken = data.refresh_token;
      cfg.expiresAt    = data.expires_at || (Math.floor(Date.now()/1000)+(data.expires_in||3600));
      cfg.userId       = data.user && data.user.id;
      cfg.email        = data.user && data.user.email;
      saveConfig(cfg);
      onSignedIn(cfg);
    } catch(e){ setErr(e.message || "Something went wrong."); }
    finally { setBusy(false); }
  }

  return (
    <div className="auth-wrap">
      <div className="brand">
        <div className="mark">{BRAND.name}</div>
        <div className="tag">{BRAND.tagline}</div>
      </div>
      {!SUPABASE_URL && (
        <div className="notice">
          Supabase isn't configured yet. Create the Orbit Supabase project, run
          <code> backend/schema.sql</code>, then set <code>SUPABASE_URL</code> and
          <code> SUPABASE_PUBLISHABLE_KEY</code> in index.html to enable sign-in.
        </div>
      )}
      <div className="field">
        <label>Email</label>
        <input className="input" type="email" autoComplete="email" value={email}
          onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
      </div>
      <div className="field">
        <label>Password</label>
        <PwInput value={pw} onChange={setPw} placeholder="••••••••"
          autoComplete={mode==="signup"?"new-password":"current-password"} onEnter={submit} />
      </div>
      {err && <div className="err">{err}</div>}
      {info && <div className="notice">{info}</div>}
      <button className="btn primary" disabled={busy} onClick={submit} style={{marginTop:6}}>
        {busy ? "…" : (mode==="signup" ? "Create account" : "Sign in")}
      </button>
      <div style={{textAlign:"center", marginTop:14}}>
        <button className="btn ghost" onClick={()=>{ setMode(mode==="signup"?"signin":"signup"); setErr(""); }}>
          {mode==="signup" ? "Have an account? Sign in" : "New here? Create an account"}
        </button>
      </div>
      {!SUPABASE_URL && (
        <div style={{textAlign:"center", marginTop:18, borderTop:"1px solid var(--line)", paddingTop:16}}>
          <button className="btn" onClick={onExplore}>Explore offline (no account)</button>
          <div className="muted" style={{marginTop:6}}>Local-only on this device — for trying it out before the backend is wired.</div>
        </div>
      )}
    </div>
  );
}

function HomeView({ data, onOpenContact, onQuickLog, onToggleTask }){
  const contacts = data.contacts || [];
  const tasks = data.tasks || [];
  const cName = (id)=> (contacts.find(c=>c.id===id)||{}).name || "";

  const due = contacts.map(c=> ({ c, info: contactDueInfo(c) }))
    .filter(x=> x.info && (x.info.state==="over" || x.info.state==="today"))
    .sort((a,b)=> b.info.days - a.info.days);

  const openTasks = tasks.filter(t=> !t.done)
    .sort((a,b)=> (a.due_date||"9999-99-99").localeCompare(b.due_date||"9999-99-99"));

  const bdays = contacts.map(c=> ({ c, d: daysUntilBirthday(c.birthday) }))
    .filter(x=> x.d!==null && x.d<=30).sort((a,b)=> a.d-b.d);

  if (due.length===0 && openTasks.length===0 && bdays.length===0){
    return <Placeholder glyph={"\u{1F44B}"} title="You're all caught up"
      note="Set a “keep in touch” cadence on a contact, or add a follow-up, and the people to reach out to show up here." />;
  }

  return (
    <div>
      {due.length>0 && (
        <div className="card">
          <div className="sec-title">Time to reach out</div>
          {due.map(({c,info})=> (
            <div key={c.id} className="list-row" onClick={()=> onOpenContact(c.id)}>
              <div className="avatar">{initials(c.name)}</div>
              <div className="lr-main"><div className="lr-name">{c.name}</div>
                <div className={"muted "+(info.state==="over"?"due-over":"due-today")}>{info.label}</div></div>
              <button className="btn" style={{width:"auto"}} onClick={e=>{ e.stopPropagation(); onQuickLog(c.id); }}>Logged</button>
            </div>
          ))}
        </div>
      )}
      {openTasks.length>0 && (
        <div className="card">
          <div className="sec-title">Follow-ups</div>
          {openTasks.map(t=> (
            <div key={t.id} className="task-row">
              <input type="checkbox" checked={false} onChange={()=> onToggleTask(t.id)} />
              <div className="lr-main" onClick={()=> t.contact_id && onOpenContact(t.contact_id)}>
                <div>{t.title}</div>
                <div className="muted">{[cName(t.contact_id), t.due_date && ("due "+fmtDate(t.due_date))].filter(Boolean).join(" · ")}</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {bdays.length>0 && (
        <div className="card">
          <div className="sec-title">Upcoming birthdays</div>
          {bdays.map(({c,d})=> (
            <div key={c.id} className="list-row" onClick={()=> onOpenContact(c.id)}>
              <div className="avatar">{initials(c.name)}</div>
              <div className="lr-main"><div className="lr-name">{c.name}</div>
                <div className="muted">{d===0?"Today! 🎉":d===1?"Tomorrow":"in "+d+" days"}</div></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PeopleView({ data, onOpenContact, onOpenOrg, onImport }){
  const [seg,setSeg] = useState("people");
  const [q,setQ] = useState("");
  const [tag,setTag] = useState("");
  const contacts = data.contacts || [];
  const orgs = data.organizations || [];
  const orgName = (id)=> (orgs.find(o=>o.id===id)||{}).name || "";
  const allTags = [...new Set(contacts.flatMap(c=> c.tags||[]))].sort();
  const ql = q.trim().toLowerCase();

  const people = contacts.filter(c=>{
    if (tag && !(c.tags||[]).includes(tag)) return false;
    if (!ql) return true;
    return (c.name||"").toLowerCase().includes(ql)
      || orgName(c.org_id).toLowerCase().includes(ql)
      || (c.title||"").toLowerCase().includes(ql)
      || (c.tags||[]).some(t=> t.toLowerCase().includes(ql))
      || (c.emails||[]).some(e=> e.toLowerCase().includes(ql));
  }).sort((a,b)=> (a.name||"").localeCompare(b.name||""));

  const companies = orgs
    .filter(o=> !ql || (o.name||"").toLowerCase().includes(ql))
    .sort((a,b)=> (a.name||"").localeCompare(b.name||""));

  return (
    <div>
      <div className="seg">
        <button className={seg==="people"?"on":""} onClick={()=>setSeg("people")}>People ({contacts.length})</button>
        <button className={seg==="companies"?"on":""} onClick={()=>setSeg("companies")}>Companies ({orgs.length})</button>
      </div>
      <input className="input search" value={q} onChange={e=>setQ(e.target.value)}
        placeholder={seg==="people"?"Search people…":"Search companies…"} />

      {seg==="people" && allTags.length>0 && (
        <div className="chips filterchips">
          <span className={"pill"+(tag===""?" on":"")} onClick={()=>setTag("")}>All</span>
          {allTags.map(t=> <span key={t} className={"pill"+(tag===t?" on":"")} onClick={()=>setTag(tag===t?"":t)}>{t}</span>)}
        </div>
      )}

      {seg==="people" ? (
        people.length===0
          ? (contacts.length===0
              ? <div>
                  <Placeholder glyph={"\u{1F465}"} title="No contacts yet"
                    note="Import your phone or Google contacts to start — or tap + to add one by hand." />
                  <button className="btn primary" style={{maxWidth:320, margin:"0 auto", display:"block"}} onClick={onImport}>Import contacts</button>
                </div>
              : <Placeholder glyph={"\u{1F465}"} title="No matches" note="Try a different search or tag." />)
          : people.map(c=>{
              const org = orgs.find(o=> o.id===c.org_id);
              const sub = [c.title, org && org.name].filter(Boolean).join(" · ") || (c.emails&&c.emails[0]) || "";
              return (
                <div key={c.id} className="list-row" onClick={()=> onOpenContact(c.id)}>
                  <div className="avatar">{initials(c.name)}</div>
                  <div className="lr-main"><div className="lr-name">{c.name||"(unnamed)"}</div>
                    <div className="muted">{sub}</div></div>
                  {c.tags && c.tags[0] && <span className="pill">{c.tags[0]}{c.tags.length>1?" +"+(c.tags.length-1):""}</span>}
                </div>
              );
            })
      ) : (
        companies.length===0
          ? <Placeholder glyph={"\u{1F3E2}"} title={orgs.length===0?"No companies yet":"No matches"}
              note={orgs.length===0?"Companies appear when you add one to a contact, or tap + → New company.":"Try a different search."} />
          : companies.map(o=>{
              const count = contacts.filter(c=> c.org_id===o.id).length;
              const sub = [o.type, count+" contact"+(count===1?"":"s")].filter(Boolean).join(" · ");
              return (
                <div key={o.id} className="list-row" onClick={()=> onOpenOrg(o.id)}>
                  <div className="avatar sq">{initials(o.name)}</div>
                  <div className="lr-main"><div className="lr-name">{o.name}</div>
                    <div className="muted">{sub}</div></div>
                </div>
              );
            })
      )}
    </div>
  );
}

/* ---- small presentational helpers ----------------------------------- */
function initials(n){
  return (n||"?").trim().split(/\s+/).map(w=> w[0]||"").slice(0,2).join("").toUpperCase() || "?";
}
function DRow({ label, val }){
  return <div className="drow"><div className="dlabel">{label}</div><div>{val}</div></div>;
}
function DField({ label, items, link }){
  if (!items || !items.length) return null;
  const href = (v)=> link==="http" ? (/^https?:/.test(v) ? v : "https://"+v) : (link+":"+v);
  return (
    <div className="drow"><div className="dlabel">{label}</div>
      <div>{items.map((v,i)=> <div key={i}><a href={href(v)} target={link==="http"?"_blank":undefined} rel="noreferrer">{v}</a></div>)}</div>
    </div>
  );
}

/* Repeatable chip-style input (tags, emails, phones). */
function MultiInput({ values, onChange, placeholder, type }){
  const [draft,setDraft] = useState("");
  function add(){ const v=draft.trim(); if(!v) return; if(!values.includes(v)) onChange([...values, v]); setDraft(""); }
  return (
    <div>

/* ============================================================
   CONTACT IMPORT (vCard) + dedupe — Phase 6
   ============================================================ */
function emailKey(e){ return (e||"").trim().toLowerCase(); }
function phoneKey(p){ const d=(p||"").replace(/\D/g,""); return d.length>10 ? d.slice(-10) : d; }
function uniqBy(arr, keyFn){
  const seen=new Set(), out=[];
  for(const v of arr){ const k=keyFn(v); if(!k){ continue; } if(!seen.has(k)){ seen.add(k); out.push(v); } }
  return out;
}
function normBday(v){
  v=(v||"").trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
  if(/^\d{8}$/.test(v)) return v.slice(0,4)+"-"+v.slice(4,6)+"-"+v.slice(6,8);
  return "";
}
function qpDecode(s){
  const bytes=[]; s=s.replace(/=\r?\n/g,"");
  for(let i=0;i<s.length;i++){
    if(s[i]==="=" && i+2<s.length && /[0-9A-Fa-f]{2}/.test(s.substr(i+1,2))){ bytes.push(parseInt(s.substr(i+1,2),16)); i+=2; }
    else bytes.push(s.charCodeAt(i));
  }
  try { return new TextDecoder("utf-8").decode(new Uint8Array(bytes)); } catch(e){ return s; }
}
function parseVCards(text){
  const cards=[];
  const blocks=text.split(/BEGIN:VCARD/i).slice(1);
  for(let raw of blocks){
    raw=raw.split(/END:VCARD/i)[0];
    const unfolded=raw.replace(/\r\n[ \t]/g,"").replace(/\n[ \t]/g,"");
    const lines=unfolded.split(/\r\n|\n|\r/).map(l=>l.replace(/\s+$/,"")).filter(Boolean);
    const c={ name:"", emails:[], phones:[], orgName:"", title:"", location:"", birthday:"", notes:"" };
    let nFallback="";
    for(const line of lines){
      const idx=line.indexOf(":"); if(idx===-1) continue;
      const left=line.slice(0,idx); let value=line.slice(idx+1);
      const params=left.split(";"); const prop=params[0].toUpperCase().replace(/^ITEM\d+\./,"");
      if(params.some(p=>/QUOTED-PRINTABLE/i.test(p))) value=qpDecode(value);
      const unesc=(x)=> (x||"").replace(/\\n/gi," ").replace(/\\,/g,",").replace(/\\;/g,";").replace(/\\\\/g,"\\").trim();
      if(prop==="FN") c.name=unesc(value);
      else if(prop==="N"){ const f=value.split(";").map(unesc); nFallback=[f[3],f[1],f[2],f[0],f[4]].filter(Boolean).join(" ").trim(); }
      else if(prop==="EMAIL"){ const e=unesc(value); if(e) c.emails.push(e); }
      else if(prop==="TEL"){ const t=unesc(value); if(t) c.phones.push(t); }
      else if(prop==="ORG"&&!c.orgName){ c.orgName=unesc(value.split(";")[0]); }
      else if(prop==="TITLE"&&!c.title){ c.title=unesc(value); }
      else if(prop==="ADR"&&!c.location){ const a=value.split(";").map(unesc); c.location=[a[3],a[4]].filter(Boolean).join(", "); }
      else if(prop==="BDAY"&&!c.birthday){ c.birthday=normBday(unesc(value)); }
      else if(prop==="NOTE"&&!c.notes){ c.notes=unesc(value); }
    }
    if(!c.name) c.name=nFallback;
    c.emails=uniqBy(c.emails, emailKey);
    c.phones=uniqBy(c.phones.map(p=>p.trim()), phoneKey);
    if(c.name || c.emails.length || c.phones.length) cards.push(c);
  }
  return cards;
}
// Classify drafts vs existing contacts; collapse within-file dupes. Returns rows.
function planImport(drafts, existing){
  const idx=new Map();
  for(const c of (existing||[])){
    for(const e of (c.emails||[])){ const k=emailKey(e); if(k) idx.set("e:"+k, c.id); }
    for(const p of (c.phones||[])){ const k=phoneKey(p); if(k) idx.set("p:"+k, c.id); }
  }
  const rows=[]; const batch=new Map();
  for(const d of drafts){
    const keys=[];
    for(const e of d.emails){ const k=emailKey(e); if(k) keys.push("e:"+k); }
    for(const p of d.phones){ const k=phoneKey(p); if(k) keys.push("p:"+k); }
    let bi=-1; for(const k of keys){ if(batch.has(k)){ bi=batch.get(k); break; } }
    if(bi>=0){ const a=rows[bi].draft;
      a.emails=uniqBy([...a.emails,...d.emails], emailKey); a.phones=uniqBy([...a.phones,...d.phones], phoneKey);
      a.name=a.name||d.name; a.orgName=a.orgName||d.orgName; a.title=a.title||d.title;
      a.location=a.location||d.location; a.birthday=a.birthday||d.birthday; a.notes=a.notes||d.notes;
      for(const k of keys) batch.set(k,bi); continue;
    }
    let target=null; for(const k of keys){ if(idx.has(k)){ target=idx.get(k); break; } }
    rows.push({ draft:d, target, include:true });
    const mi=rows.length-1; for(const k of keys) batch.set(k,mi);
  }
  return rows;
}

function ImportFlow({ existingContacts, onApply, onClose }){
  const [stage,setStage]=useState("pick");
  const [rows,setRows]=useState([]);
  const [err,setErr]=useState("");
  function onFile(e){
    const f=e.target.files && e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const drafts=parseVCards(String(reader.result||""));
        if(!drafts.length){ setErr("No contacts found — make sure it's a .vcf (vCard) export."); return; }
        setRows(planImport(drafts, existingContacts)); setErr(""); setStage("review");
      }catch(ex){ setErr("Couldn't read that file: "+(ex&&ex.message)); }
    };
    reader.readAsText(f);
  }
  const targetName=(id)=> (existingContacts.find(c=>c.id===id)||{}).name || "existing";
  const newCount=rows.filter(r=>r.include && !r.target).length;
  const mergeCount=rows.filter(r=>r.include && r.target).length;
  function toggle(i){ setRows(rows.map((r,j)=> j===i?{...r,include:!r.include}:r)); }

  if(stage==="pick") return (
    <div className="overlay">
      <div className="overlay-head"><button className="icon-btn" onClick={onClose}>←</button><b>Import contacts</b><span style={{width:34}} /></div>
      <div className="overlay-body">
        <p className="muted">Upload a <b>.vcf</b> (vCard) file from your phone or Google Contacts. It's parsed right here on your device and only saved to your own account.</p>
        <label className="btn primary" style={{display:"block", textAlign:"center", marginTop:6}}>
          Choose .vcf file
          <input type="file" accept=".vcf,.vcard,text/vcard" style={{display:"none"}} onChange={onFile} />
        </label>
        {err && <div className="err">{err}</div>}
        <div className="card" style={{marginTop:16}}>
          <div style={{fontWeight:600, marginBottom:6}}>How to export a .vcf</div>
          <div className="muted"><b>iPhone / iCloud:</b> icloud.com → Contacts → select all (Ctrl/Cmd-A) → gear ⚙︎ → Export vCard.<br/><br/><b>Google:</b> contacts.google.com → Export → vCard.</div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="overlay">
      <div className="overlay-head">
        <button className="icon-btn" onClick={()=>setStage("pick")}>←</button>
        <b>Review import</b>
        <button className="btn ghost" disabled={newCount+mergeCount===0} onClick={()=> onApply(rows)}>Import</button>
      </div>
      <div className="overlay-body">
        <div className="card"><b>{newCount}</b> new · <b>{mergeCount}</b> to merge into existing
          {rows.length-(newCount+mergeCount)>0 && <span className="muted"> · {rows.length-(newCount+mergeCount)} skipped</span>}</div>
        {rows.slice(0,300).map((r,i)=> (
          <div key={i} className="task-row">
            <input type="checkbox" checked={r.include} onChange={()=>toggle(i)} />
            <div className="lr-main" style={{opacity:r.include?1:0.5}}>
              <div className="lr-name">{r.draft.name||"(no name)"}</div>
              <div className="muted">{[(r.draft.emails[0]||r.draft.phones[0]||""), r.target?("merge → "+targetName(r.target)):null].filter(Boolean).join(" · ")}</div>
            </div>
            <span className={"pill"+(r.target?"":" on")}>{r.target?"Merge":"New"}</span>
          </div>
        ))}
        {rows.length>300 && <div className="muted" style={{marginTop:10}}>+{rows.length-300} more will also be imported.</div>}
      </div>
    </div>
  );
}

/* Runs an async AI thunk and shows loading -> result with a Copy button. */
function AIPanel({ title, run, onClose }){
  const [state,setState] = useState("loading");   // loading | done | error
  const [text,setText]   = useState("");
  const [copied,setCopied] = useState(false);
  useEffect(()=>{
    let live=true;
    (async ()=>{ try { const r=await run(); if(live){ setText(r||""); setState("done"); } }
      catch(e){ if(live){ setText((e&&e.message)||"AI error"); setState("error"); } } })();
    return ()=>{ live=false; };
  },[]);  // eslint-disable-line
  function copy(){ try { navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),1500); } catch(e){} }
  return (
    <div className="overlay">
      <div className="overlay-head">
        <button className="icon-btn" onClick={onClose}>←</button>
        <b>{title}</b>
        {state==="done"
          ? <button className="btn ghost" onClick={copy}>{copied?"Copied":"Copy"}</button>
          : <span style={{width:34}} />}
      </div>
      <div className="overlay-body">
        {state==="loading" && <div className="ai-loading"><span className="spinner" /> Thinking…</div>}
        {state==="error" && <div className="err">{text}</div>}
        {state==="done" && <div className="ai-out">{text}</div>}
      </div>
    </div>
  );
}

function App(){
  const [cfg,setCfg] = useState(()=> loadConfig());
  const [authed,setAuthed] = useState(()=>{ const c=loadConfig(); return configComplete(c) || !!c.offline; });
  const [tab,setTab] = useState("home");
  const [data,setData] = useState(()=> loadCache() || emptyData());
  const [toast,setToast] = useState("");
  const [updateVer,setUpdateVer] = useState(null);
  const loadedOnce = useRef(false);

  const [overlay,setOverlay] = useState(null);

  function flash(msg){ setToast(msg); setTimeout(()=> setToast(""), 2600); }
  function applyCfg(next){ setCfg(next); saveConfig(next); }

  // Persist a whole collection: optimistic local + cache, then push to backend.
  function saveCollection(name, next){
    setData(d=>{ const nd={...d, [name]:next}; saveCache(nd); return nd; });
    if (configComplete(cfg)) putCollection(cfg, name, next).catch(e=> logMsg("WARN","save "+name+": "+(e&&e.message)));
  }
  function ensureOrg(name){
    const nm=(name||"").trim(); if(!nm) return null;
    const existing=(data.organizations||[]).find(o=> (o.name||"").toLowerCase()===nm.toLowerCase());
    if (existing) return existing.id;
    const o={ id:uid("org"), name:nm, type:"", website:"", location:"", tags:[], notes:"", created_at:todayISO(), updated_at:todayISO() };
    saveCollection("organizations", [o, ...(data.organizations||[])]);
    return o.id;
  }
  function upsertContact(c){
    const arr=data.contacts||[]; const i=arr.findIndex(x=>x.id===c.id);
    saveCollection("contacts", i>=0 ? arr.map(x=> x.id===c.id?c:x) : [c, ...arr]);
  }
  function deleteContact(id){ saveCollection("contacts", (data.contacts||[]).filter(x=>x.id!==id)); }
  function upsertOrg(o){
    const arr=data.organizations||[]; const i=arr.findIndex(x=>x.id===o.id);
    saveCollection("organizations", i>=0 ? arr.map(x=> x.id===o.id?o:x) : [o, ...arr]);
  }
  function deleteOrg(id){ saveCollection("organizations", (data.organizations||[]).filter(x=>x.id!==id)); }

  function onSaveContact(form){
    const base = (overlay && overlay.contact) || {};
    const org_id = ensureOrg(form.orgName);
    const c = {
      id: base.id || uid("c"),
      name:form.name, emails:form.emails, phones:form.phones, org_id,
      title:form.title, location:form.location, tags:form.tags,
      how_we_met:form.how_we_met, birthday:form.birthday, notes:form.notes,
      cadence_days:form.cadence_days,
      last_interaction_at: base.last_interaction_at || null,
      created_at: base.created_at || todayISO(), updated_at: todayISO(),
    };
    upsertContact(c);
    setOverlay({ type:"contactDetail", id:c.id });
  }
  function onSaveOrg(form){
    const base = (overlay && overlay.org) || {};
    const o = { id: base.id || uid("org"), name:form.name, type:form.type, website:form.website,
      location:form.location, tags:form.tags, notes:form.notes,
      created_at: base.created_at || todayISO(), updated_at: todayISO() };
    upsertOrg(o);
    setOverlay({ type:"orgDetail", id:o.id });
  }

  // Interactions + follow-up tasks (Phase 3).
  function saveInteraction(contactId, interaction, form){
    const base = interaction || {};
    const it = { id: base.id || uid("i"), contact_id:contactId, type:form.type, date:form.date,
      note:form.note, created_at: base.created_at || todayISO() };
    const arr = data.interactions || []; const i = arr.findIndex(x=> x.id===it.id);
    saveCollection("interactions", i>=0 ? arr.map(x=> x.id===it.id?it:x) : [it, ...arr]);
    const c = (data.contacts||[]).find(x=> x.id===contactId);
    if (c){ const last = maxDate(c.last_interaction_at, it.date);
      if (last !== c.last_interaction_at) upsertContact({ ...c, last_interaction_at:last, updated_at:todayISO() }); }
  }
  function deleteInteraction(id){ saveCollection("interactions", (data.interactions||[]).filter(x=> x.id!==id)); }
  function quickLog(contactId){ saveInteraction(contactId, null, { type:"note", date:todayISO(), note:"Reached out" }); flash("Logged"); }
  function addTask(contactId, title, due_date){
    const t = { id:uid("t"), contact_id:contactId, title, due_date:due_date||null, done:false, created_at:todayISO() };
    saveCollection("tasks", [t, ...(data.tasks||[])]);
  }
  function toggleTask(id){ saveCollection("tasks", (data.tasks||[]).map(t=> t.id===id ? {...t, done:!t.done} : t)); }
  function deleteTask(id){ saveCollection("tasks", (data.tasks||[]).filter(t=> t.id!==id)); }

  // Deals (optional layer).
  function upsertDeal(d){
    const arr=data.deals||[]; const i=arr.findIndex(x=>x.id===d.id);
    saveCollection("deals", i>=0 ? arr.map(x=> x.id===d.id?d:x) : [d, ...arr]);
  }
  function deleteDeal(id){ saveCollection("deals", (data.deals||[]).filter(x=> x.id!==id)); }
  function setDealStage(id, stage){ saveCollection("deals", (data.deals||[]).map(x=> x.id===id ? {...x, stage, updated_at:todayISO()} : x)); }
  function onSaveDeal(form){
    const base = (overlay && overlay.deal) || {};
    const contact = (data.contacts||[]).find(c=> (c.name||"").toLowerCase()===(form.contactName||"").trim().toLowerCase());
    const org_id = form.orgName ? ensureOrg(form.orgName) : null;
    const d = { id: base.id || uid("d"), title:form.title, value:form.value, stage:form.stage,
      contact_id: contact ? contact.id : null, org_id,
      expected_close: form.expected_close || null, notes:form.notes,
      created_at: base.created_at || todayISO(), updated_at: todayISO() };
    upsertDeal(d);
    setOverlay({ type:"dealDetail", id:d.id });
  }

  // AI (lightweight, via the backend relay). Needs a real signed-in session.
  function aiReady(){ if(!configComplete(cfg)){ flash("AI works once you're signed in to the backend"); return false; } return true; }
  function summarizeContact(c){
    if(!aiReady()) return;
    const ix = (data.interactions||[]).filter(x=> x.contact_id===c.id)
      .slice().sort((a,b)=> (a.date||"").localeCompare(b.date||""));
    const lines = ix.map(i=> i.date+" — "+ITypeLabel(i.type)+(i.note?(": "+i.note):"")).join("\n");
    const sys = "You summarize a personal relationship history in 2-3 sentences, then suggest one natural next step. Warm and concise.";
    const user = "Contact: "+c.name+(c.title?(", "+c.title):"")+"\nNotes: "+(c.notes||"-")+"\n\nInteractions:\n"+(lines||"(none logged yet)");
    setOverlay({ type:"ai", title:"Summary — "+c.name,
      run: ()=> aiRelay(cfg, { task:"summarize_contact", system:sys, messages:[{role:"user", content:user}], max_tokens:400 }) });
  }
  function draftMessage(c){
    if(!aiReady()) return;
    const sys = "You write a short, warm, natural check-in message to reconnect with someone. Output only the message — no preamble, no quotes.";
    const ctx = "Recipient: "+c.name+"\nHow we met / context: "+(c.how_we_met||"-")+"\nNotes: "+(c.notes||"-")+"\nLast contacted: "+(c.last_interaction_at||"a while ago");
    setOverlay({ type:"ai", title:"Draft for "+c.name,
      run: ()=> aiRelay(cfg, { task:"draft_message", system:sys, messages:[{role:"user", content:ctx}], max_tokens:300 }) });
  }

  // Apply a reviewed contact import (Phase 6). Batches orgs + contacts into one save each.
  function applyImport(rows){
    let contacts=[...(data.contacts||[])];
    let orgs=[...(data.organizations||[])];
    const orgByName=new Map(orgs.map(o=>[(o.name||"").toLowerCase(), o]));
    function ensureOrgLocal(name){
      const nm=(name||"").trim(); if(!nm) return null;
      const ex=orgByName.get(nm.toLowerCase()); if(ex) return ex.id;
      const o={ id:uid("org"), name:nm, type:"", website:"", location:"", tags:[], notes:"", created_at:todayISO(), updated_at:todayISO() };
      orgs=[o,...orgs]; orgByName.set(nm.toLowerCase(), o); return o.id;
    }
    const byId=new Map(contacts.map(c=>[c.id,c]));
    let added=0, mergedN=0;
    for(const r of rows){
      if(!r.include) continue;
      const org_id=ensureOrgLocal(r.draft.orgName);
      if(r.target && byId.has(r.target)){
        const ex=byId.get(r.target);
        const upd={ ...ex,
          emails:uniqBy([...(ex.emails||[]), ...r.draft.emails], emailKey),
          phones:uniqBy([...(ex.phones||[]), ...r.draft.phones], phoneKey),
          org_id: ex.org_id||org_id, title: ex.title||r.draft.title, location: ex.location||r.draft.location,
          birthday: ex.birthday||r.draft.birthday, notes: ex.notes||r.draft.notes, name: ex.name||r.draft.name,
          updated_at: todayISO() };
        contacts=contacts.map(c=> c.id===ex.id?upd:c); byId.set(ex.id, upd); mergedN++;
      } else {
        const c={ id:uid("c"), name:r.draft.name||"(no name)", emails:r.draft.emails, phones:r.draft.phones,
          org_id, title:r.draft.title||"", location:r.draft.location||"", tags:[], how_we_met:"",
          birthday:r.draft.birthday||"", notes:r.draft.notes||"", cadence_days:null, last_interaction_at:null,
          created_at:todayISO(), updated_at:todayISO() };
        contacts=[c, ...contacts]; byId.set(c.id, c); added++;
      }
    }
    saveCollection("contacts", contacts);
    saveCollection("organizations", orgs);
    setOverlay(null);
    flash("Imported "+added+" new"+(mergedN?(" · merged "+mergedN):""));
  }

  // Service worker registration + version check.
  useEffect(()=>{
    if (!("serviceWorker" in navigator)) return;
    const onLoad = ()=> navigator.serviceWorker.register("/sw.js")
      .then(()=> logMsg("SW","registered")).catch(e=> logMsg("WARN","SW register: "+(e&&e.message)));
    if (document.readyState==="complete") onLoad();
    else window.addEventListener("load", onLoad);
    return ()=> window.removeEventListener("load", onLoad);
  },[]);

  const checkUpdate = useCallback(async ()=>{
    const v = await fetchDeployedVersion();
    if (v && isNewer(v, APP_VERSION)) setUpdateVer(v);
    else flash("You're up to date");
  },[]);
  useEffect(()=>{ const t=setTimeout(checkUpdate, 2000); return ()=> clearTimeout(t); },[checkUpdate]);

  // Initial data load from the backend once signed in.
  useEffect(()=>{
    if (!authed || !configComplete(cfg) || loadedOnce.current) return;  // offline mode skips backend load
    loadedOnce.current = true;
    (async ()=>{
      try {
        const next = emptyData();
        for (const name of ALL_COLLECTIONS){
          try { next[name] = await getCollection(cfg, name); } catch(e){ logMsg("WARN","load "+name+": "+e.message); }
        }
        setData(next); saveCache(next);
        initPush(cfg);
      } catch(e){ logMsg("ERROR","initial load: "+e.message); }
    })();
  },[authed]);  // eslint-disable-line

  if (!authed){
    return <AuthScreen
      onSignedIn={(c)=>{ setCfg(c); setAuthed(true); }}
      onExplore={()=>{ const c={ ...loadConfig(), offline:true, userId:"local" }; saveConfig(c); setCfg(c); setAuthed(true); }} />;
  }

  const showDeals = !!cfg.dealsEnabled;
  let screen;
  if (tab==="home") screen = <HomeView data={data}
                    onOpenContact={(id)=> setOverlay({type:"contactDetail", id})}
                    onQuickLog={quickLog} onToggleTask={toggleTask} />;
  else if (tab==="people") screen = <PeopleView data={data}
                    onOpenContact={(id)=> setOverlay({type:"contactDetail", id})}
                    onOpenOrg={(id)=> setOverlay({type:"orgDetail", id})}
                    onImport={()=> setOverlay({type:"import"})} />;
  else if (tab==="deals") screen = <DealsView data={data} onOpenDeal={(id)=> setOverlay({type:"dealDetail", id})} />;
  else screen = <SettingsView cfg={cfg} onCfg={applyCfg} onLogout={signOutHard}
                    onCheckUpdate={checkUpdate} updateVer={updateVer}
                    onImport={()=> setOverlay({type:"import"})} />;

  return (
    <div className="app-shell">
      {updateVer && (
        <div className="syncbar"><span>Update available</span>
          <button onClick={()=> applyUpdate(updateVer)}>Reload</button></div>
      )}
      <TopBar tab={tab} />
      <div className="content">{screen}</div>
      {toast && <div className="toast">{toast}</div>}

      {overlay && overlay.type==="add" &&
        <AddSheet onClose={()=> setOverlay(null)} dealsEnabled={showDeals}
          onContact={()=> setOverlay({type:"contactForm"})}
          onCompany={()=> setOverlay({type:"orgForm"})}
          onDeal={()=> setOverlay({type:"dealForm"})} />}

      {overlay && overlay.type==="contactForm" &&
        <ContactForm contact={overlay.contact} orgs={data.organizations||[]}
          onSave={onSaveContact}
          onClose={()=> setOverlay(overlay.contact ? {type:"contactDetail", id:overlay.contact.id} : null)} />}

      {overlay && overlay.type==="contactDetail" && (()=>{
        const c=(data.contacts||[]).find(x=> x.id===overlay.id);
        if(!c){ return null; }
        const org=(data.organizations||[]).find(o=> o.id===c.org_id);
        return <ContactDetail contact={c} org={org}
          interactions={(data.interactions||[]).filter(x=> x.contact_id===c.id)}
          tasks={(data.tasks||[]).filter(x=> x.contact_id===c.id)}
          onEdit={()=> setOverlay({type:"contactForm", contact:c})}
          onDelete={()=>{ deleteContact(c.id); setOverlay(null); }}
          onClose={()=> setOverlay(null)}
          onLogInteraction={()=> setOverlay({type:"interactionForm", contactId:c.id})}
          onDeleteInteraction={deleteInteraction}
          onAddTask={(title,due)=> addTask(c.id, title, due)}
          onToggleTask={toggleTask}
          onDeleteTask={deleteTask}
          onSummarize={()=> summarizeContact(c)}
          onDraft={()=> draftMessage(c)} />;
      })()}

      {overlay && overlay.type==="interactionForm" && (()=>{
        const c=(data.contacts||[]).find(x=> x.id===overlay.contactId);
        return <InteractionForm contactName={c && c.name} interaction={overlay.interaction}
          onSave={(form)=>{ saveInteraction(overlay.contactId, overlay.interaction, form); setOverlay({type:"contactDetail", id:overlay.contactId}); }}
          onClose={()=> setOverlay({type:"contactDetail", id:overlay.contactId})} />;
      })()}

      {overlay && overlay.type==="ai" &&
        <AIPanel title={overlay.title} run={overlay.run} onClose={()=> setOverlay(null)} />}

      {overlay && overlay.type==="import" &&
        <ImportFlow existingContacts={data.contacts||[]} onApply={applyImport} onClose={()=> setOverlay(null)} />}

      {overlay && overlay.type==="dealForm" &&
        <DealForm deal={overlay.deal} contacts={data.contacts||[]} orgs={data.organizations||[]}
          onSave={onSaveDeal}
          onClose={()=> setOverlay(overlay.deal ? {type:"dealDetail", id:overlay.deal.id} : null)} />}

      {overlay && overlay.type==="dealDetail" && (()=>{
        const d=(data.deals||[]).find(x=> x.id===overlay.id);
        if(!d){ return null; }
        const contact=(data.contacts||[]).find(c=> c.id===d.contact_id);
        const org=(data.organizations||[]).find(o=> o.id===d.org_id);
        return <DealDetail deal={d} contact={contact} org={org}
          onEdit={()=> setOverlay({type:"dealForm", deal:d})}
          onDelete={()=>{ deleteDeal(d.id); setOverlay(null); }}
          onStage={(s)=> setDealStage(d.id, s)}
          onOpenContact={(id)=> setOverlay({type:"contactDetail", id})}
          onOpenOrg={(id)=> setOverlay({type:"orgDetail", id})}
          onClose={()=> setOverlay(null)} />;
      })()}

      {overlay && overlay.type==="orgForm" &&
        <OrgForm org={overlay.org} onSave={onSaveOrg}
          onClose={()=> setOverlay(overlay.org ? {type:"orgDetail", id:overlay.org.id} : null)} />}

      {overlay && overlay.type==="orgDetail" && (()=>{
        const o=(data.organizations||[]).find(x=> x.id===overlay.id);
        if(!o){ return null; }
        return <OrgDetail org={o} contacts={(data.contacts||[]).filter(c=> c.org_id===o.id)}
          onEdit={()=> setOverlay({type:"orgForm", org:o})}
          onDelete={()=>{ deleteOrg(o.id); setOverlay(null); }}
          onOpenContact={(id)=> setOverlay({type:"contactDetail", id})}
          onClose={()=> setOverlay(null)} />;
      })()}
      <nav className="nav">
        <button className={tab==="home"?"on":""} onClick={()=>setTab("home")}><Icon name="home"/>Home</button>
        <button className={tab==="people"?"on":""} onClick={()=>setTab("people")}><Icon name="people"/>People</button>
        <button onClick={()=> setOverlay({type:"add"})}><span className="add"><Icon name="plus"/></span></button>
        {showDeals
          ? <button className={tab==="deals"?"on":""} onClick={()=>setTab("deals")}><Icon name="deals"/>Deals</button>
          : <button className={tab==="settings"?"on":""} onClick={()=>setTab("settings")}><Icon name="settings"/>Settings</button>}
        {showDeals &&
          <button className={tab==="settings"?"on":""} onClick={()=>setTab("settings")}><Icon name="settings"/>Settings</button>}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
